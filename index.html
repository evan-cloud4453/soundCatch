<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 사운드 캐치</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbit&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div id="title-screen" class="screen active">
        <h1>SOUND CATCH</h1>
        <p class="subtitle">우주 최고의 청력을 증명하라</p>
        <input type="text" id="nickname-input" class="input-field" placeholder="당신의 호출명을 입력하세요">
        <button class="btn" onclick="goToRoomSelect()">시작하기 (Start)</button>
    </div>

    <div id="room-select-screen" class="screen">
        <h2>통신 채널 연결</h2>
        <button class="btn" onclick="createRoom()">새 방 생성하기</button>
        <div class="divider">
            <span>OR</span>
        </div>
        <input type="text" id="room-code-input" class="input-field" placeholder="방 코드 입력 (예: A1B2)">
        <button class="btn purple" onclick="joinRoom()">기존 방 들어가기</button>
    </div>

    <div id="lobby-screen" class="screen">
        <h2>대기실: <span id="lobby-room-code" class="highlight-blue"></span></h2>
        <div class="player-list" id="player-list-container"></div>
        <div id="host-controls" class="hidden-controls">
            <button class="btn" onclick="startGame()">게임 시작</button>
        </div>
        <p id="waiting-msg" class="waiting-text">방장이 게임을 시작하기를 기다리는 중...</p>
    </div>

    <div id="game-screen" class="screen">
        <h3 id="question-category" class="highlight-purple">카테고리: ?</h3>
        <div class="visualizer">
            <span>[ 오디오 파형 시각화 영역 ]</span>
        </div>
        <div id="timer-display" class="timer">15</div>
        <input type="text" id="answer-input" class="input-field" placeholder="정답을 타이핑하고 Enter를 누르세요" onkeypress="handleAnswerEnter(event)">
        <button class="btn" onclick="submitAnswer()">제출 (Enter)</button>
        <p id="round-status" class="status-text"></p>
    </div>

    <div id="result-screen" class="screen">
        <h1 class="game-over-title">GAME OVER</h1>
        <h2 id="winner-name" class="winner-text">우승자: ?</h2>
        <button class="btn" onclick="location.reload()">메인으로 돌아가기</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
