<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 사운드 캐치</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="stars-bg"></div> <main class="glass-panel">
        <div id="title-screen">
            <h1 class="neon-text">SOUND CATCH</h1>
            <input type="text" id="nickname" placeholder="닉네임을 입력하세요">
            <button id="btn-start" class="glow-button">시작하기</button>
        </div>

        <div id="room-selection" class="hidden">
            <button id="btn-create-room" class="glow-button">방 생성하기</button>
            <div class="divider">OR</div>
            <input type="text" id="room-code-input" placeholder="방 코드 입력">
            <button id="btn-join-room" class="glow-button">들어가기</button>
        </div>

        <div id="game-screen" class="hidden">
            <h2 id="room-display">Room: ----</h2>
            <div id="audio-visualizer"></div>
            <input type="text" id="answer-input" placeholder="정답을 입력하고 Enter를 누르세요" disabled>
        </div>
    </main>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
