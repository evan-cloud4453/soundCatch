<!DOCTYPE html>
<html lang="ko">
<head>
    <meta property="og:title" content="Cosmic Vocabulary Test">
    <meta property="og:description" content="우주를 탐험하며 영단어를 정복하세요.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Vocabulary</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    
    <div id="home-screen" class="screen active">
        <h1 class="title-glow" style="font-size: 3em;">COSMIC VOCA</h1>
        <p style="color: var(--text-muted); margin-bottom: 4vh; font-family: 'Orbitron', sans-serif;">Interactive Vocabulary System</p>
        
        <div style="width: 100%;">
            <button class="btn" onclick="switchScreen('join-room-screen')">방 들어가기 (Join Room)</button>
            <button class="btn outline-purple" onclick="switchScreen('create-room-screen')">방 만들기 (Create Room)</button>
            <button class="btn" style="color: var(--text-muted); border-color: rgba(255,255,255,0.2);" onclick="switchScreen('settings-screen')">환경 설정 (Settings)</button>
        </div>
    </div>

    <div id="join-room-screen" class="screen">
        <h2 style="color: var(--accent-cyan);">CONNECT TO ROOM</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">초대 코드를 입력하고 함선에 탑승하세요.</p>
        
        <div style="width: 100%;">
            <input type="text" id="room-code" placeholder="방 코드 (Room Code)" class="input-field">
            <input type="text" id="player-name" placeholder="닉네임 (Nickname)" class="input-field">
            
            <button class="btn" onclick="alert('방 접속 로직 구현 필요')">탑승하기 (JOIN)</button>
            <button class="btn outline-purple" style="border:none; margin-top:10px;" onclick="switchScreen('home-screen')">← 로비로 귀환</button>
        </div>
    </div>

    <div id="create-room-screen" class="screen">
        <h2 style="color: var(--accent-purple);">CREATE NEW ROOM</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">새로운 시험 세션을 생성합니다.</p>
        
        <div style="width: 100%;">
            <input type="text" id="new-room-name" placeholder="방 이름 (Room Name)" class="input-field">
            <input type="password" id="host-pw" placeholder="호스트 비밀번호 (Password)" class="input-field">
            
            <button class="btn outline-purple" onclick="alert('방 생성 로직 구현 필요')">방 생성 (CREATE)</button>
            <button class="btn" style="border:none; color: var(--text-muted); margin-top:10px;" onclick="switchScreen('home-screen')">← 로비로 귀환</button>
        </div>
    </div>

    <div id="settings-screen" class="screen">
        <h2>SYSTEM SETTINGS</h2>
        
        <div class="settings-panel">
            <div class="setting-row">
                <span style="font-size: 0.9em;">배경음 (BGM)</span>
                <input type="range" id="bgm-slider" min="0" max="1" step="0.1" value="0.5">
            </div>
            <div class="setting-row">
                <span style="font-size: 0.9em;">효과음 (SFX)</span>
                <input type="range" id="sfx-slider" min="0" max="1" step="0.1" value="0.7">
            </div>
        </div>

        <div class="settings-panel" style="border-color: rgba(255, 42, 109, 0.3);">
            <p style="color: var(--danger-color); font-size: 0.85em; text-align: center; margin: 0 0 15px 0;">위험 구역: 데이터 초기화</p>
            <button class="btn" style="background: transparent; border-color: var(--danger-color); color: var(--danger-color); padding: 10px; font-size: 0.9em; margin-bottom: 0;" onclick="alert('캐시 삭제 로직')">모든 데이터 초기화</button>
        </div>

        <button class="btn" style="border:none; background: transparent; color: var(--text-muted); margin-top:10px;" onclick="switchScreen('home-screen')">← 로비로 귀환</button>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
