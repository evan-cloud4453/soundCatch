<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Voca - Multiplayer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="youtube-player" style="position:absolute; width:0; height:0; border:none;"></div>

<div class="app-container">
    
    <div id="home-screen" class="screen active">
        <h1 class="title-glow" style="font-size: 3em;">COSMIC VOCA</h1>
        <p style="color: var(--text-muted); margin-bottom: 4vh; font-family: 'Orbitron', sans-serif;">Interactive Multiplayer System</p>
        <div style="width: 100%;">
            <input type="text" id="my-nickname" placeholder="내 닉네임 입력 (필수)" class="input-field">
            <button class="btn" onclick="openJoinScreen()">방 들어가기 (Join Room)</button>
            <button class="btn outline-purple" onclick="openCreateScreen()">방 만들기 (Create Room)</button>
        </div>
    </div>

    <div id="join-room-screen" class="screen">
        <h2 style="color: var(--accent-cyan);">ROOM LIST</h2>
        <div id="room-list-container" class="scroll-box">
            </div>
        <button class="btn" style="border:none; color: var(--text-muted); margin-top:20px;" onclick="switchScreen('home-screen')">← 로비로 귀환</button>
    </div>

    <div id="create-room-screen" class="screen">
        <h2 style="color: var(--accent-purple);">CREATE ROOM</h2>
        <div class="settings-panel scroll-box" style="margin-bottom: 15px; padding: 15px;">
            <input type="text" id="new-room-name" placeholder="방 제목 입력" class="input-field" style="margin-bottom: 10px;">
            <input type="password" id="new-room-pw" placeholder="비밀번호 (선택)" class="input-field" style="margin-bottom: 15px;">
            
            <div class="setting-row">
                <span>최대 인원</span>
                <select id="new-room-max" class="select-field">
                    <option value="2">2명</option>
                    <option value="3">3명</option>
                    <option value="4">4명</option>
                    <option value="5" selected>5명</option>
                </select>
            </div>
            <div class="setting-row">
                <span>게임 모드</span>
                <select id="new-room-mode" class="select-field">
                    <option value="EASY">Easy</option>
                    <option value="HARD">Hard</option>
                </select>
            </div>
            <div class="setting-row">
                <span>목표 점수</span>
                <select id="new-room-score" class="select-field">
                    <option value="10">10점</option>
                    <option value="20" selected>20점</option>
                    <option value="30">30점</option>
                </select>
            </div>
        </div>
        <button class="btn outline-purple" onclick="requestCreateRoom()">방 생성 (CREATE)</button>
        <button class="btn" style="border:none; color: var(--text-muted); margin-top:5px;" onclick="switchScreen('home-screen')">← 취소</button>
    </div>

    <div id="waiting-room-screen" class="screen">
        <h2 id="lobby-room-name" style="color: var(--accent-cyan); font-size: 1.5em; margin-bottom: 5px;">ROOM NAME</h2>
        <p style="color: var(--text-muted); margin-bottom: 20px;" id="lobby-room-info">모드: EASY | 목표: 20점</p>
        
        <div id="player-grid" class="player-grid scroll-box">
            </div>

        <div style="width: 100%; margin-top: 20px;" id="lobby-controls">
            </div>
        <button class="btn" style="border:none; color: var(--danger-color); margin-top:10px;" onclick="leaveRoom()">나가기</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-scoreboard" class="scoreboard"></div>
        
        <div id="game-status-board" class="status-board">
            <h3 id="category-text" style="color: var(--accent-purple); margin:0 0 10px 0;">대기 중...</h3>
            <p id="status-text" style="font-size: 1.1em; margin:0;">호스트의 문제 출제를 기다려주세요.</p>
        </div>

        <button id="btn-buzz" class="btn buzzer-btn" disabled>버저 누르기! 🔴</button>

        <div id="host-controls" class="hidden settings-panel" style="margin-top: 20px; border-color: var(--accent-cyan);">
            <p style="color: var(--accent-cyan); text-align: center; margin-top:0;">[호스트 전용 컨트롤]</p>
            <button id="btn-next-question" class="btn outline-purple" style="font-size:0.9em; padding:10px;">다음 문제 재생 🎵</button>
            
            <div id="judge-area" class="hidden" style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                <p style="text-align: center; margin-top: 0;" id="answer-text">정답: ???</p>
                <div style="display: flex; gap: 10px;">
                    <button id="btn-correct" class="btn" style="background:#05d59e; color:#000; border:none; margin:0;">⭕ 맞힘</button>
                    <button id="btn-wrong" class="btn" style="background:#ff2a6d; color:#fff; border:none; margin:0;">❌ 틀림</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="data.js"></script> <script src="script.js"></script>
</body>
</html>
