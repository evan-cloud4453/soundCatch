<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Voca - Multiplayer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="youtube-player" style="position:absolute; width:0; height:0; border:none;"></div>

<div class="app-container">
    
    <div id="splash-screen" class="screen active">
        <h1 style="font-size: 3.5em; margin-top: 20vh;">COSMIC<br>QUIZ SHOW</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 40px;">우주 퀴즈 시스템에 접속합니다.</p>
        
        <input type="text" id="my-nickname" placeholder="닉네임을 입력하세요" class="input-field" style="max-width: 300px; margin: 0 auto 20px auto; display: block;">
        <button class="btn" style="max-width: 300px; margin: 0 auto;" onclick="enterLobby()">시작하기</button>
    </div>

    <div id="home-screen" class="screen">
        <h1 style="font-size: 2.5em; margin-bottom: 5px;">MAIN LOBBY</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 40px;" id="welcome-msg">환영합니다.</p>
        
        <div style="max-width: 350px; margin: 0 auto; width: 100%;">
            <button class="btn" onclick="openJoinScreen()">방 들어가기</button>
            <button class="btn outline" onclick="openCreateScreen()">방 만들기</button>
            <button class="btn outline" style="border-color: var(--border-color); color: var(--text-muted);" onclick="switchScreen('settings-screen')">환경 설정</button>
        </div>
    </div>

    <div id="join-room-screen" class="screen">
        <h2 style="color: var(--accent-cyan);">ROOM LIST</h2>
        <div id="room-list-container" class="scroll-box">
            </div>
        <button class="btn" style="border:none; color: var(--text-muted); margin-top:20px;" onclick="switchScreen('home-screen')">← 로비로 귀환</button>
    </div>

    <div id="create-room-screen" class="screen">
        <h2 style="color: var(--accent-purple);">CREATE ROOM</h2>
        <div class="settings-panel scroll-box" style="margin-bottom: 15px; padding: 15px;">
            <input type="text" id="new-room-name" placeholder="방 제목 입력" class="input-field" style="margin-bottom: 10px;">
            <input type="password" id="new-room-pw" placeholder="비밀번호 (선택)" class="input-field" style="margin-bottom: 15px;">
            
            <div class="setting-row">
                <span>최대 인원</span>
                <select id="new-room-max" class="select-field">
                    <option value="2">2명</option>
                    <option value="3">3명</option>
                    <option value="4">4명</option>
                    <option value="5" selected>5명</option>
                </select>
            </div>
            <div class="setting-row">
                <span>게임 모드</span>
                <select id="new-room-mode" class="select-field">
                    <option value="EASY">Easy</option>
                    <option value="HARD">Hard</option>
                </select>
            </div>
            <div class="setting-row">
                <span>목표 점수</span>
                <select id="new-room-score" class="select-field">
                    <option value="10">10점</option>
                    <option value="20" selected>20점</option>
                    <option value="30">30점</option>
                </select>
            </div>
        </div>
        <button class="btn outline-purple" onclick="requestCreateRoom()">방 생성 (CREATE)</button>
        <button class="btn" style="border:none; color: var(--text-muted); margin-top:5px;" onclick="switchScreen('home-screen')">← 취소</button>
    </div>

    <div id="waiting-room-screen" class="screen">
        <h2 id="lobby-room-name" style="color: var(--accent-cyan); font-size: 1.5em; margin-bottom: 5px;">ROOM NAME</h2>
        <p style="color: var(--text-muted); margin-bottom: 20px;" id="lobby-room-info">모드: EASY | 목표: 20점</p>
        
        <div id="player-grid" class="player-grid scroll-box">
            </div>

        <div style="width: 100%; margin-top: 20px;" id="lobby-controls">
            </div>
        <button class="btn" style="border:none; color: var(--danger-color); margin-top:10px;" onclick="leaveRoom()">나가기</button>
    </div>

        <div id="game-screen" class="screen">
            <div id="game-scoreboard" class="scoreboard"></div>

<div id="game-status-board" class="status-board" style="background: rgba(0,0,0,0.3); border: 1px solid var(--accent-color); padding: 15px; border-radius: 2px; margin-bottom: 15px; text-align: center;">
    <h3 id="category-text" style="margin-bottom: 10px;">대기 중...</h3>
    <p id="status-text" style="margin: 0; font-size: 1.1em; color: var(--text-main);">곧 기계가 문제를 출제합니다.</p>
    <h1 id="countdown-text" style="font-size: 4em; color: var(--danger-color); margin: 10px 0; display: none;">3</h1>
</div>

<button id="btn-buzz" class="buzzer-btn btn" disabled style="background-color: var(--wrong-color); color: white; height: 150px; font-size: 1.8em; border: none; border-radius: 15px; margin: 0 auto;">버저 누르기!</button>

<div id="answer-input-area" class="hidden" style="margin-top: 20px; text-align: center; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 2px; border: 1px solid var(--accent-color);">
    <p style="color: var(--accent-color); margin-bottom: 10px;">정답을 입력하세요! (남은 시간: <span id="answer-timer" style="font-weight:bold; color:var(--danger-color);">10</span>초)</p>
    <input type="text" id="type-answer" class="input-field" placeholder="정답 입력 후 엔터" style="max-width: 300px; margin: 0 auto 10px auto;">
    <button id="btn-submit-answer" class="btn" style="max-width: 300px; margin: 0 auto;">제출하기</button>
</div>
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="data.js"></script> <script src="script.js"></script>
</body>
</html>
